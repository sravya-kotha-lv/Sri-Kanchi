name: Deploy Environments

on:
  push:
    branches:
      - production
      - development
      - testing

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./front-end
        run: npm install

      - name: Build React App
        working-directory: ./front-end
        run: npm run build

      - name: Deploy Production
        if: github.ref == 'refs/heads/production'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: sravya-kotha-lv/srikanchi-production
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          cname: production.luvetha.xyz

      - name: Deploy Development
        if: github.ref == 'refs/heads/development'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: sravya-kotha-lv/srikanchi-development
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          cname: development.luvetha.xyz

      - name: Deploy Testing
        if: github.ref == 'refs/heads/testing'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: sravya-kotha-lv/srikanchi-testing
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          cname: testing.luvetha.xyz
