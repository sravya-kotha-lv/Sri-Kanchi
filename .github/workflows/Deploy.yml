name: Deploy Branch Environments

on:
  push:
    branches:
      - production
      - development
      - testing

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./front-end
        run: npm install

      - name: Build React App
        working-directory: ./front-end
        run: npm run build

      - name: Deploy Production Folder
        if: github.ref == 'refs/heads/production'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          destination_dir: production
          keep_files: true
          cname: luvetha.xyz

      - name: Deploy Development Folder
        if: github.ref == 'refs/heads/development'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          destination_dir: development
          keep_files: true
          cname: luvetha.xyz

      - name: Deploy Testing Folder
        if: github.ref == 'refs/heads/testing'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          destination_dir: testing
          keep_files: true
          cname: luvetha.xyz
