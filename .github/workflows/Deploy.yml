name: Deploy All Environments

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./front-end
        run: npm install

      - name: Build React Vite app
        working-directory: ./front-end
        run: npm run build

      - name: Add production CNAME
        run: echo "prod.luvetha.xyz" > ./front-end/dist/CNAME

      - name: Deploy to Production
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: YOUR_GITHUB_USERNAME/luvetha-prod
          publish_branch: gh-pages
          publish_dir: ./front-end/dist

      - name: Add development CNAME
        run: echo "devo.luvetha.xyz" > ./front-end/dist/CNAME

      - name: Deploy to Development
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: YOUR_GITHUB_USERNAME/luvetha-devo
          publish_branch: gh-pages
          publish_dir: ./front-end/dist

      - name: Add testing CNAME
        run: echo "test.luvetha.xyz" > ./front-end/dist/CNAME

      - name: Deploy to Testing
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: YOUR_GITHUB_USERNAME/luvetha-test
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
