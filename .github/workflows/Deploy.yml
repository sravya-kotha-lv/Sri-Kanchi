name: Deploy Environments

on:
  push:
    branches:
      - Production
      - Development
      - Testing

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./front-end
        run: npm install

      - name: Build React App
        working-directory: ./front-end
        run: npm run build

      - name: Deploy Production
        if: github.ref == 'refs/heads/Production'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: sravya-kotha-lv/luvetha-prod
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          cname: prod.luvetha.xyz

      - name: Deploy Development
        if: github.ref == 'refs/heads/Development'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: sravya-kotha-lv/luvetha-devo
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          cname: devo.luvetha.xyz

      - name: Deploy Testing
        if: github.ref == 'refs/heads/Testing'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: sravya-kotha-lv/luvetha-test
          publish_branch: gh-pages
          publish_dir: ./front-end/dist
          cname: test.luvetha.xyz
