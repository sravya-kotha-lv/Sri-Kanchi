name: Deploy Environments

on:
  push:
    branches:
      - dev
      - test
      - prod
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ vars.BACKEND_PORT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,PORT
          script: |
            set -e

            cd /var/www/your-project

            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            cd front-end
            npm install
            npm run build

            if [ "${{ github.ref_name }}" = "dev" ]; then
              sudo mkdir -p /var/www/html/dev
              sudo rm -rf /var/www/html/dev/*
              sudo cp -r dist/* /var/www/html/dev/
            elif [ "${{ github.ref_name }}" = "test" ]; then
              sudo mkdir -p /var/www/html/test
              sudo rm -rf /var/www/html/test/*
              sudo cp -r dist/* /var/www/html/test/
            elif [ "${{ github.ref_name }}" = "prod" ]; then
              sudo mkdir -p /var/www/html/prod
              sudo rm -rf /var/www/html/prod/*
              sudo cp -r dist/* /var/www/html/prod/
            fi

            cd ../back-end
            npm install

            cat > .env <<EOF
            DB_HOST=$DB_HOST
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=$DB_NAME
            JWT_SECRET=$JWT_SECRET
            PORT=$PORT
            EOF

            if [ "${{ github.ref_name }}" = "dev" ]; then
              pm2 restart backend-dev || pm2 start server.js --name backend-dev
            elif [ "${{ github.ref_name }}" = "test" ]; then
              pm2 restart backend-test || pm2 start server.js --name backend-test
            elif [ "${{ github.ref_name }}" = "prod" ]; then
              pm2 restart backend-prod || pm2 start server.js --name backend-prod
            fi

            pm2 save
            sudo systemctl restart nginx
