name: CI CD Deploy to Server

on:
  push:
    branches:
      - main
      - dev
      - test
      - prod
  pull_request:
    branches:
      - main
      - dev
      - test
      - prod

jobs:
  build:
    name: CI Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend Install and Build
        working-directory: front-end
        run: |
          npm ci
          npm run build

      - name: Backend Install Check
        working-directory: back-end
        run: npm ci

  deploy:
    name: CD Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            BRANCH="${{ github.ref_name }}"

            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "prod" ]; then
              PORT="5000"
              PROJECT_DIR="/var/www/production/shree-tours"
              FRONTEND_DIR="/var/www/html/prod"
              PM2_NAME="backend-prod"
            elif [ "$BRANCH" = "dev" ]; then
              PORT="5001"
              PROJECT_DIR="/var/www/development/Sri-Kanchi"
              FRONTEND_DIR="/var/www/html/dev"
              PM2_NAME="backend-dev"
            elif [ "$BRANCH" = "test" ]; then
              PORT="5002"
              PROJECT_DIR="/var/www/testing/Sri-Kanchi"
              FRONTEND_DIR="/var/www/html/test"
              PM2_NAME="backend-test"
            else
              echo "Invalid branch: $BRANCH"
              exit 1
            fi

            echo "Deploying branch: $BRANCH"

            cd "$PROJECT_DIR"

            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "Building frontend..."
            cd "$PROJECT_DIR/front-end"
            npm ci
            npm run build

            sudo mkdir -p "$FRONTEND_DIR"
            sudo rsync -av --delete dist/ "$FRONTEND_DIR/"

            echo "Installing backend..."
            cd "$PROJECT_DIR/back-end"
            npm ci

            printf 'DB_HOST=%s\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\nJWT_SECRET=%s\nPORT=%s\n' \
              "${{ secrets.DB_HOST }}" \
              "${{ secrets.DB_USER }}" \
              "${{ secrets.DB_PASSWORD }}" \
              "${{ secrets.DB_NAME }}" \
              "${{ secrets.JWT_SECRET }}" \
              "$PORT" > .env

            if [ ! -f server.js ]; then
              echo "ERROR: server.js not found"
              ls -la
              exit 1
            fi

            if pm2 describe "$PM2_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
            else
              pm2 start server.js --name "$PM2_NAME"
            fi

            pm2 save

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deploy completed successfully"
